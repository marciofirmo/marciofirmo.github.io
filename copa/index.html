<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Cultural 2026</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f1f5f9; color:#1e293b; }
  .wrap { max-width:820px; margin:0 auto; padding:16px; }
  .head { text-align:center; margin-bottom:18px; }
  .head h1 { font-size:24px; font-weight:800; margin:0; }
  .head p { font-size:13px; color:#64748b; margin:4px 0 0; }
  .lbl { font-size:13px; font-weight:600; color:#475569; margin-bottom:8px; }
  .strip { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:16px; -webkit-overflow-scrolling:touch; }
  .chip { flex:0 0 auto; border:1px solid #e2e8f0; background:#fff; color:#475569; border-radius:16px; padding:8px 12px; text-align:center; cursor:pointer; font-family:inherit; }
  .chip.on { border-color:#10b981; background:#10b981; color:#fff; }
  .chip .fl { font-size:18px; line-height:1; }
  .chip .nm { font-size:10px; margin-top:3px; white-space:nowrap; opacity:.9; }
  .banner { background:#1e293b; border-radius:12px; padding:12px; margin-bottom:12px; text-align:center; }
  .banner .when { color:#cbd5e1; font-size:12px; margin-bottom:4px; }
  .banner .vs { color:#fff; font-weight:700; font-size:16px; }
  .banner .vs .sc { color:#34d399; margin:0 8px; }
  .panels { display:flex; flex-direction:column; gap:12px; }
  @media(min-width:560px){ .panels{ flex-direction:row; } }
  .panel { flex:1; min-width:0; background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .pc { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .pc .fl { font-size:30px; }
  .pc h3 { font-size:18px; font-weight:700; margin:0; line-height:1.1; }
  .pc .trad { font-size:12px; color:#94a3b8; margin:2px 0 0; }
  .big { display:flex; align-items:center; gap:12px; border-radius:12px; padding:12px; text-decoration:none; margin-bottom:8px; }
  .big.mus { background:#ecfdf5; }
  .big.cin { background:#eef2ff; }
  .big .ic { font-size:22px; }
  .big .tag { font-size:10px; text-transform:uppercase; letter-spacing:.04em; font-weight:700; }
  .big.mus .tag { color:#059669; }
  .big.cin .tag { color:#4f46e5; }
  .big .ti { font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .big.mus .ti { color:#065f46; }
  .big.cin .ti { color:#3730a3; }
  .big .pl { margin-left:auto; font-size:20px; }
  .big.mus .pl { color:#059669; }
  .big.cin .pl { color:#4f46e5; }
  .more { background:none; border:none; color:#94a3b8; font-size:12px; width:100%; padding:8px 0 0; cursor:pointer; font-family:inherit; }
  .extra a { display:block; font-size:14px; margin-top:6px; text-decoration:none; }
  .extra a.s { color:#047857; }
  .extra a.f { color:#4338ca; }
  .foot { text-align:center; font-size:11px; color:#94a3b8; margin-top:20px; }
</style>
</head>

</div>

const MATCHES = [

  {d:"25/06 • 17h",st:"final",h:"CUW",a:"CIV",s:"0 x 2"},
  {d:"25/06 • 20h",st:"scheduled",h:"TUN",a:"NED"},

  {d:"21/06 • 22h",st:"scheduled",h:"NZL",a:"EGY"},

];

let sel = 0, openH = false, openA = false;
const sp = q => "https://open.spotify.com/search/" + encodeURIComponent(q);
const yt = q => "https://www.youtube.com/results?search_query=" + encodeURIComponent(q);
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function panel(code, side, open){
  const c = C[code];
  const extraSongs = c.songs.slice(1).map(s=>`<a class="s" href="${sp(c.name+' '+s)}" target="_blank" rel="noreferrer">♪ ${esc(s)}</a>`).join("");
  const extraFilms = c.films.slice(1).map(f=>`<a class="f" href="${yt(f+' filme trailer')}" target="_blank" rel="noreferrer">▸ ${esc(f)}</a>`).join("");
  const hasMore = c.songs.length>1 || c.films.length>1;
  return `<div class="panel">
    <div class="pc"><span class="fl">${c.flag}</span><div style="min-width:0"><h3>${esc(c.name)}</h3><p class="trad">${esc(c.trad)}</p></div></div>
    <a class="big mus" href="${sp(c.name+' '+c.songs[0])}" target="_blank" rel="noreferrer"><span class="ic">🎵</span><div style="min-width:0"><div class="tag">Música</div><div class="ti">${esc(c.songs[0])}</div></div><span class="pl">▶</span></a>
    <a class="big cin" href="${yt(c.films[0]+' filme trailer')}" target="_blank" rel="noreferrer"><span class="ic">🎬</span><div style="min-width:0"><div class="tag">Filme</div><div class="ti">${esc(c.films[0])}</div></div><span class="pl">▶</span></a>
    ${hasMore?`<button class="more" onclick="toggle('${side}')">${open?'▲ ocultar':'▼ ver mais'}</button>`:''}
    ${open?`<div class="extra">${extraSongs}${extraFilms}</div>`:''}
  </div>`;
}

function render(){
  document.getElementById("strip").innerHTML = MATCHES.map((m,i)=>`<button class="chip ${i===sel?'on':''}" onclick="pick(${i})"><div class="fl">${C[m.h].flag} ${C[m.a].flag}</div><div class="nm">${esc(C[m.h].name)} × ${esc(C[m.a].name)}</div></button>`).join("");
  const m = MATCHES[sel];
  document.getElementById("detail").innerHTML = `<div class="banner"><div class="when">${m.d}${m.st==='final'?' • resultado final':''}</div><div class="vs">${C[m.h].flag} ${esc(C[m.h].name)}<span class="sc">${m.s||'vs'}</span>${esc(C[m.a].name)} ${C[m.a].flag}</div></div><div class="panels">${panel(m.h,'h',openH)}${panel(m.a,'a',openA)}</div>`;
}
function pick(i){ sel=i; openH=false; openA=false; render(); }
function toggle(side){ if(side==='h')openH=!openH; else openA=!openA; render(); }
render();
</script>
</body>
</html>
