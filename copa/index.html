  .big.cin { background:#eef2ff; }

const WA = "5521981022589";
// Playlists públicas reais por país. Para os países fora desta lista, a página cai
// automaticamente numa busca pública do Spotify pelo gênero do país (campo trad).
const SPL = {
  ECU:"https://open.spotify.com/playlist/1WFqWwhObDkXUF4v9653nS", // Pasillos, Albazos y Valses Ecuatorianos
  GER:"https://open.spotify.com/playlist/72Dq4XYJWAYGUG2a0xJlUL", // Traditional German Folk Songs
  CIV:"https://open.spotify.com/playlist/37i9dQZF1DX0z1epx5KTtS", // Coupé Décalé (oficial Spotify)
  SUI:"https://open.spotify.com/playlist/3Kzjn8uYK5tWFJscYcmPG0", // Schweizer Volksmusik und Jodler
  BIH:"https://open.spotify.com/playlist/1jNwudOacmpSz8t6KbKp7p", // Sevdalinka – Bosnian folk music
};
const sp = q => "https://open.spotify.com/search/" + encodeURIComponent(q);
const yt = q => "https://www.youtube.com/results?search_query=" + encodeURIComponent(q);
const wa = country => "https://wa.me/" + WA + "?text=" + encodeURIComponent("Sugestão para " + country + " (Copa Cultural): ");
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const cleanSong = s => s.replace(/\([^)]*\)/g,"").replace(/—\s*tradicional/gi,"").replace(/\btradicional\b/gi,"").replace(/\s+/g," ").trim();
const cleanFilm = f => f.replace(/\([^)]*\)/g,"").replace(/\s+/g," ").trim();
const WD = ["dom","seg","ter","qua","qui","sex","sáb"];
function isoLocal(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtDate(iso){ const p=iso.split("-"); const d=new Date(+p[0],+p[1]-1,+p[2]); return WD[d.getDay()]+" "+p[2]+"/"+p[1]; }

function buildList(){
  const today = isoLocal(new Date());
  const win = [-1,0,1,2].map(i=>{ const d=new Date(); d.setDate(d.getDate()+i); return isoLocal(d); });
  let list = MATCHES.filter(m=>win.includes(m.date));
  let note = "Mostrando de ontem até os próximos 2 dias";
  if(list.length===0){
    const future = MATCHES.filter(m=>m.date>=today).sort((a,b)=>a.date<b.date?-1:1);
    if(future.length){ const nd=future[0].date; list=MATCHES.filter(m=>m.date===nd); note="Próximos jogos disponíveis"; }
  }
  if(list.length===0){ list = MATCHES.slice(-6); note="Últimos jogos cadastrados"; }
  // Jogos anteriores à janela atual (mais recentes primeiro), para o botão "Ver jogos anteriores".
  const minDate = list.length ? list.reduce((a,m)=>m.date<a?m.date:a, list[0].date) : null;
  const prevList = minDate ? MATCHES.filter(m=>m.date<minDate).sort((a,b)=>a.date<b.date?1:-1) : [];
  return { list, note, prevList };
}

let DATA = buildList();
let sel = 0, selSrc = 'main', openH = false, openA = false, showPrev = false;

function panel(code, side, open){
  const c = C[code];
  if(!c) return `<div class="panel"><p class="empty">Seleção ainda não cadastrada.</p></div>`;
  const extraSongs = c.songs.slice(1).map(s=>`<a class="s" href="${sp(cleanSong(s))}" target="_blank" rel="noreferrer">♪ ${esc(s)}</a>`).join("");
  const extraFilms = c.films.slice(1).map(f=>`<a class="f" href="${yt(cleanFilm(f)+' trailer')}" target="_blank" rel="noreferrer">▸ ${esc(f)}</a>`).join("");
  const hasMore = c.songs.length>1 || c.films.length>1;
  return `<div class="panel">
    <div class="pc"><span class="fl">${c.flag}</span><div style="min-width:0"><h3>${esc(c.name)}</h3><p class="trad">${esc(c.trad)}</p></div></div>
    <a class="big mus" href="${sp(cleanSong(c.songs[0]))}" target="_blank" rel="noreferrer"><span class="ic">🎵</span><div style="min-width:0"><div class="tag">Música</div><div class="ti">${esc(c.songs[0])}</div></div><span class="pl">▶</span></a>
    <a class="big cin" href="${yt(cleanFilm(c.films[0])+' trailer')}" target="_blank" rel="noreferrer"><span class="ic">🎬</span><div style="min-width:0"><div class="tag">Filme</div><div class="ti">${esc(c.films[0])}</div></div><span class="pl">▶</span></a>
    <a class="suggest" href="${wa(c.name)}" target="_blank" rel="noreferrer">💡 Sugira uma música ou filme</a>
    ${hasMore?`<button class="more" onclick="toggle('${side}')">${open?'▲ ocultar':'▼ ver mais'}</button>`:''}
    ${open?`<div class="extra">${extraSongs}${extraFilms}</div>`:''}
  </div>`;
}

function chipHtml(m,i,src){
  return `<button class="chip ${selSrc===src&&i===sel?'on':''}" onclick="pick(${i},'${src}')"><div class="dt">${fmtDate(m.date)} · ${m.t}</div><div class="fl">${C[m.h].flag} ${C[m.a].flag}</div><div class="nm">${esc(C[m.h].name)} × ${esc(C[m.a].name)}</div></button>`;
}

// Link de música por país: playlist pública real (SPL) ou, na falta, busca pública por gênero.
function countryPL(c){ return SPL[c] || sp(C[c].name+" "+C[c].trad); }
// Botões de Spotify do jogo: sempre 1 botão por país (os dois times que jogam).
function spotifyBtns(m){
  const btns = [m.h,m.a].map(c=>`<a class="plbtn" href="${countryPL(c)}" target="_blank" rel="noreferrer">🎧 ${C[c].flag} Música — ${esc(C[c].name)}</a>`).join("");
  return `<div class="plrow">${btns}</div>`;
}

function render(){
  const { list, note, prevList } = DATA;
  document.getElementById("note").textContent = note;
  const pbtn = document.getElementById("prevbtn");
  const pstrip = document.getElementById("prevstrip");
  if(list.length===0){
    document.getElementById("strip").innerHTML = "";
    pbtn.style.display = "none"; pstrip.style.display = "none"; pstrip.innerHTML = "";
    document.getElementById("detail").innerHTML = `<p class="empty">Sem jogos cadastrados para esta janela.<br>Volte mais perto da próxima rodada.</p>`;
    return;
  }
  document.getElementById("strip").innerHTML = list.map((m,i)=>chipHtml(m,i,'main')).join("");
  // Botão/tira de jogos anteriores
  if(prevList.length){
    pbtn.style.display = "block";
    pbtn.textContent = showPrev ? "📅 Ocultar jogos anteriores" : "📅 Ver jogos anteriores";
    pstrip.style.display = showPrev ? "flex" : "none";
    pstrip.innerHTML = showPrev ? prevList.map((m,i)=>chipHtml(m,i,'prev')).join("") : "";
  } else {
    pbtn.style.display = "none"; pstrip.style.display = "none"; pstrip.innerHTML = "";
  }
  // Detalhe do jogo selecionado (da tira atual ou da de anteriores)
  let activeList = selSrc==='prev' ? prevList : list;
  if(sel>=activeList.length){ sel=0; selSrc='main'; activeList=list; }
  const m = activeList[sel];
  document.getElementById("detail").innerHTML = `<div class="banner"><div class="when">${fmtDate(m.date)} · ${m.t}${m.s?' • resultado final':''}</div><div class="vs">${C[m.h].flag} ${esc(C[m.h].name)}<span class="sc">${m.s||'vs'}</span>${esc(C[m.a].name)} ${C[m.a].flag}</div>${spotifyBtns(m)}</div><div class="panels">${panel(m.h,'h',openH)}${panel(m.a,'a',openA)}</div>`;
}
function pick(i,src){ sel=i; selSrc=src||'main'; openH=false; openA=false; render(); }
function togglePrev(){ showPrev=!showPrev; render(); }
function toggle(side){ if(side==='h')openH=!openH; else openA=!openA; render(); }
render();
</script>
